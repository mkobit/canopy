name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/design/**'
      - 'docs/architecture/**'
      - 'docs/research/**'
      - 'openspec/**'
      - '**/AGENTS.md'
      - '.claude/**'
      - '.jules/**'
      - '.gemini/**'
  pull_request:
    paths-ignore:
      - 'docs/design/**'
      - 'docs/architecture/**'
      - 'docs/research/**'
      - 'openspec/**'
      - '**/AGENTS.md'
      - '.claude/**'
      - '.jules/**'
      - '.gemini/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        bun-version: [1.3.13]

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          version: v2026.5.1
          cache: 'true'

      - name: Install dependencies
        id: install
        run: bun install --frozen-lockfile

      # Build first: prefer-immutable-types resolves cross-package
      # types via each package's published dist/index.d.ts.
      - name: Build
        if: "!cancelled() && steps.install.outcome == 'success'"
        run: bun run build

      - name: Lint
        if: "!cancelled() && steps.install.outcome == 'success'"
        run: bun run lint

      - name: Typecheck
        if: "!cancelled() && steps.install.outcome == 'success'"
        run: bun run typecheck

      - name: Test
        if: "!cancelled() && steps.install.outcome == 'success'"
        run: bun run test -- --coverage --coverage-reporter=lcov

      - name: Upload coverage
        if: "!cancelled() && steps.install.outcome == 'success'"
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
