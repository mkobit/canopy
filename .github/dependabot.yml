version: 2
updates:
  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'cron'
      cronjob: '0 8 1,15 * *'
    assignees:
      - 'mkobit'
    cooldown:
      default-days: 14
    groups:
      typescript:
        patterns:
          - 'typescript'
          - 'tsx'
          - 'bun-types'
          - '@types/node'
      lint-and-format:
        patterns:
          - 'eslint*'
          - '@eslint/*'
          - '@stylistic/*'
          - '@typescript-eslint/*'
          - 'prettier*'
          - 'globals'
      build-and-test:
        patterns:
          - 'vite*'
          - '@vitejs/*'
          - 'husky'
          - 'lint-staged'
          - 'happy-dom'
          - '@happy-dom/*'
          - '@testing-library/*'
          - 'fake-indexeddb'
          - 'electron'
      react-and-ui:
        patterns:
          - 'react'
          - 'react-*'
          - '@types/react*'
          - '@xyflow/*'
          - 'clsx'
          - 'lucide-react'
          - 'tailwind*'
          - '@tailwindcss/*'
          - 'postcss'
          - 'autoprefixer'
      functional:
        patterns:
          - 'remeda'
          - 'effect'
          - '@effect/*'
      other:
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'cron'
      cronjob: '0 8 1,15 * *'
    assignees:
      - 'mkobit'
    cooldown:
      default-days: 14
    groups:
      all:
        patterns:
          - '*'
